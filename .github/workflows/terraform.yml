name: Terraform CI/CD - CloudScale Project 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v3
        with:
          username: jibreel3932
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: jibreel3932/cloudscale-app:latest

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"
      - run: tofu init
      - run: tofu validate
      - run: tofu plan -var="student_name=JibrelAbubakrJibrel" -var="docker_image=jibreel3932/cloudscale-app:latest" -out=tfplan
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  approval:
    name: Awaiting Manual Approval
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - run: echo "Approved!"

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: approval
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"
      - run: tofu init
      - uses: actions/download-artifact@v4
        with:
          name: tfplan
      - run: tofu apply -var="student_name=JibrelAbubakrJibrel" -var="docker_image=jibreel3932/cloudscale-app:latest" -auto-approve
      - run: tofu output
